<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <rect width="1200" height="675" fill="#f8f5ee"/>

  <rect x="40" y="40" width="1120" height="595" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <text x="80" y="110" font-family="Helvetica Neue, sans-serif" font-size="22" font-weight="700" fill="#b8121a" letter-spacing="6">GLOBAL FUNDS · NEW YORK → SEOUL</text>

  <text x="80" y="270" font-family="Helvetica Neue, sans-serif" font-size="220" font-weight="900" fill="#0a0a0a" letter-spacing="-8">$6<tspan fill="#b8121a">B</tspan></text>
  <text x="80" y="320" font-family="Nanum Myeongjo, serif" font-size="32" font-style="italic" fill="#0a0a0a">Roundhill 메모리 ETF, 한 달 자금 유입</text>

  <!-- NYC skyline -->
  <g transform="translate(700,340)">
    <rect x="0" y="120" width="40" height="160" fill="#0a0a0a"/>
    <rect x="50" y="60" width="60" height="220" fill="#0a0a0a"/>
    <rect x="120" y="100" width="40" height="180" fill="#0a0a0a"/>
    <rect x="170" y="20" width="80" height="260" fill="#0a0a0a"/>
    <polygon points="210,20 210,-20 220,-30 230,-20 230,20" fill="#0a0a0a"/>
    <rect x="260" y="80" width="50" height="200" fill="#0a0a0a"/>
    <rect x="320" y="140" width="60" height="140" fill="#0a0a0a"/>
    <rect x="390" y="40" width="50" height="240" fill="#0a0a0a"/>
  </g>

  <!-- Arrow from NYC to Korea -->
  <g transform="translate(80,470)">
    <line x1="0" y1="20" x2="900" y2="20" stroke="#b8121a" stroke-width="6"/>
    <polygon points="900,5 925,20 900,35" fill="#b8121a"/>
    <text x="0" y="70" font-family="Helvetica Neue, sans-serif" font-size="14" font-weight="700" fill="#0a0a0a" letter-spacing="3">NEW YORK</text>
    <text x="900" y="70" text-anchor="end" font-family="Helvetica Neue, sans-serif" font-size="14" font-weight="700" fill="#0a0a0a" letter-spacing="3">SEOUL (SAMSUNG · SK HYNIX)</text>
  </g>
</svg>
</svg>