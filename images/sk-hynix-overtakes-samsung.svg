<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <rect width="1200" height="675" fill="#f8f5ee"/>

  <rect x="40" y="40" width="1120" height="595" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <text x="80" y="110" font-family="Helvetica Neue, sans-serif" font-size="22" font-weight="700" fill="#b8121a" letter-spacing="6">MEMORY VALUATION · MAY 14, 2026</text>

  <text x="80" y="200" font-family="Helvetica Neue, sans-serif" font-size="68" font-weight="900" fill="#0a0a0a">SK HYNIX <tspan fill="#b8121a">›</tspan> SAMSUNG</text>
  <text x="80" y="245" font-family="Nanum Myeongjo, serif" font-size="28" font-style="italic" fill="#0a0a0a">12개월 선행 PER 기준, 사상 처음</text>

  <!-- Two crossing lines -->
  <g transform="translate(80,330)">
    <line x1="0" y1="160" x2="1040" y2="160" stroke="#d6d2c4"/>
    <line x1="0" y1="80" x2="1040" y2="80" stroke="#d6d2c4" stroke-dasharray="4,4"/>
    <line x1="0" y1="0" x2="1040" y2="0" stroke="#d6d2c4"/>

    <!-- Samsung (flatter) -->
    <polyline points="0,90 130,85 260,82 390,80 520,82 650,85 780,88 910,90 1040,92" fill="none" stroke="#0e3a78" stroke-width="4"/>
    <text x="1050" y="96" font-family="Helvetica Neue, sans-serif" font-size="18" font-weight="700" fill="#0e3a78">SAMSUNG</text>

    <!-- SK Hynix (rising past) -->
    <polyline points="0,140 130,130 260,115 390,100 520,82 650,55 780,32 910,18 1040,10" fill="none" stroke="#b8121a" stroke-width="5"/>
    <text x="1050" y="14" font-family="Helvetica Neue, sans-serif" font-size="18" font-weight="700" fill="#b8121a">SK HYNIX</text>

    <circle cx="520" cy="82" r="9" fill="#0a0a0a"/>
    <text x="500" y="200" font-family="Helvetica Neue, sans-serif" font-size="12" font-weight="700" fill="#0a0a0a">CROSSOVER</text>
  </g>

</svg>