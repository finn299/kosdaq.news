<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <rect width="1200" height="675" fill="#f8f5ee"/>

  <!-- Newspaper texture frame -->
  <rect x="40" y="40" width="1120" height="595" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <text x="80" y="110" font-family="Helvetica Neue, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#b8121a" letter-spacing="6">KOSPI INDEX · MAY 11, 2026</text>

  <!-- Big number -->
  <text x="80" y="290" font-family="Helvetica Neue, Helvetica, sans-serif" font-size="220" font-weight="900" fill="#0a0a0a" letter-spacing="-8">8,000</text>
  <text x="80" y="340" font-family="Nanum Myeongjo, Georgia, serif" font-size="34" font-style="italic" fill="#0a0a0a">— 사상 처음, 그러나 그 자리에서 멈춰 섰다</text>

  <!-- Line chart -->
  <g transform="translate(80,420)">
    <line x1="0" y1="160" x2="1040" y2="160" stroke="#d6d2c4" stroke-width="1"/>
    <line x1="0" y1="120" x2="1040" y2="120" stroke="#d6d2c4" stroke-width="1"/>
    <line x1="0" y1="80" x2="1040" y2="80" stroke="#d6d2c4" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="0" y1="40" x2="1040" y2="40" stroke="#d6d2c4" stroke-width="1"/>
    <polyline points="0,150 80,140 160,135 240,128 320,115 400,98 480,82 560,55 640,30 720,18 800,40 880,68 960,95 1040,110" fill="none" stroke="#b8121a" stroke-width="4"/>
    <circle cx="720" cy="18" r="10" fill="#b8121a"/>
    <text x="735" y="14" font-family="Helvetica Neue, sans-serif" font-size="16" font-weight="700" fill="#b8121a">8,021 (intraday)</text>
    <text x="0" y="180" font-family="Helvetica Neue, sans-serif" font-size="12" fill="#0a0a0a" font-weight="600">MAY 4</text>
    <text x="1000" y="180" font-family="Helvetica Neue, sans-serif" font-size="12" fill="#0a0a0a" font-weight="600">MAY 11</text>
  </g>

</svg>