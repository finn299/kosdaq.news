<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <rect width="1200" height="675" fill="#f8f5ee"/>

  <rect x="40" y="40" width="1120" height="595" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <text x="80" y="110" font-family="Helvetica Neue, sans-serif" font-size="22" font-weight="700" fill="#b8121a" letter-spacing="6">EDITORIAL · KOSDAQ CLEANUP</text>

  <text x="80" y="220" font-family="Helvetica Neue, sans-serif" font-size="110" font-weight="900" fill="#0a0a0a">정리는 시작됐다.</text>
  <text x="80" y="320" font-family="Helvetica Neue, sans-serif" font-size="110" font-weight="900" fill="#b8121a">일관성은?</text>
  <text x="80" y="370" font-family="Nanum Myeongjo, serif" font-size="28" font-style="italic" fill="#0a0a0a">외국인이 코스닥을 다시 보유하는 단계로 가려면 — 한 가지가 더 필요하다.</text>

  <!-- Schematic: bar chart with one being swept out -->
  <g transform="translate(80,440)">
    <rect x="0" y="60" width="60" height="100" fill="#0a0a0a"/>
    <rect x="80" y="40" width="60" height="120" fill="#0a0a0a"/>
    <rect x="160" y="80" width="60" height="80" fill="#0a0a0a"/>
    <rect x="240" y="20" width="60" height="140" fill="#0a0a0a"/>
    <rect x="320" y="100" width="60" height="60" fill="#0a0a0a" opacity="0.3"/>
    <line x1="320" y1="160" x2="380" y2="100" stroke="#b8121a" stroke-width="3"/>
    <line x1="320" y1="100" x2="380" y2="160" stroke="#b8121a" stroke-width="3"/>
    <rect x="400" y="50" width="60" height="110" fill="#0a0a0a"/>
    <rect x="480" y="30" width="60" height="130" fill="#0a0a0a"/>
    <text x="600" y="100" font-family="Helvetica Neue, sans-serif" font-size="18" font-weight="700" fill="#0a0a0a">DELISTING THRESHOLD ↑</text>
